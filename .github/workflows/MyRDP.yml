name: MyRDPDesktop
 
on:
  workflow_dispatch:
    inputs:
      session_count:
        description: 'رقم الجلسة (لا تعدّله يدوياً)'
        required: false
        default: '1'
 
jobs:
  secure-rdp:
    runs-on: self-hosted
    timeout-minutes: 1440
 
    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
 
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389
 
          Restart-Service -Name TermService -Force
 
      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper   | Get-Random -Count 4
          $rawPassword += $charSet.Lower   | Get-Random -Count 4
          $rawPassword += $charSet.Number  | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
 
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators"       -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
 
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
 
          if (-not (Get-LocalUser -Name "RDP")) {
              Write-Error "User creation failed"; exit 1
          }
 
      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force
 
      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
              --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
              --hostname=gh-runner-$env:GITHUB_RUN_ID
 
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              $retries++
          }
 
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned."; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
 
      - name: Verify RDP Accessibility
        run: |
          $result = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $result.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"; exit 1
          }
          Write-Host "TCP connectivity successful!"
 
      - name: Maintain Connection + Auto-Restart for 24h
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO:     ${{ github.repository }}
          SESSION:  ${{ github.event.inputs.session_count }}
          # اسم ملف الـ workflow — غيّره إذا أسميته بشكل مختلف
          WORKFLOW_FILE: rdp-24h.yml
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "   RDP ACTIVE  --  Session $env:SESSION / 4"
          Write-Host "=========================================="
          Write-Host "  Address  : $env:TAILSCALE_IP"
          Write-Host "  Username : RDP"
          Write-Host "  Password : $env:RDP_PASSWORD"
          Write-Host "  Duration : ~5h 40m per session (24h total)"
          Write-Host "=========================================="
          Write-Host ""
 
          # انتظر 5 ساعات و30 دقيقة = 19800 ثانية
          $waitSeconds = 19800
          $interval    = 300
          $elapsed     = 0
 
          while ($elapsed -lt $waitSeconds) {
              $remaining = [math]::Round(($waitSeconds - $elapsed) / 60)
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session $env:SESSION/4 active - ${remaining}m remaining"
              Start-Sleep -Seconds $interval
              $elapsed += $interval
          }
 
          # إطلاق الجلسة التالية تلقائياً إن لم نصل للجلسة الرابعة
          $nextSession = [int]$env:SESSION + 1
 
          if ($nextSession -le 4) {
              Write-Host ""
              Write-Host "Triggering session $nextSession/4 automatically..."
 
              $body = @{
                  ref    = "${{ github.ref_name }}"
                  inputs = @{ session_count = "$nextSession" }
              } | ConvertTo-Json -Compress
 
              try {
                  Invoke-RestMethod `
                      -Uri     "https://api.github.com/repos/$env:REPO/actions/workflows/$env:WORKFLOW_FILE/dispatches" `
                      -Method  POST `
                      -Headers @{
                          Authorization = "Bearer $env:GH_TOKEN"
                          Accept        = "application/vnd.github+json"
                          "X-GitHub-Api-Version" = "2022-11-28"
                      } `
                      -Body        $body `
                      -ContentType "application/json"
 
                  Write-Host "Session $nextSession triggered successfully!"
              } catch {
                  Write-Error "Failed to trigger next session: $_"
                  exit 1
              }
 
          } else {
              Write-Host ""
              Write-Host "All 4 sessions complete. 24-hour RDP session ended."
          }
